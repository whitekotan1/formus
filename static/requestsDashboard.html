<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formus — Inbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { text-decoration: none; color: inherit; }

    :root {
      --font:  'Outfit', sans-serif;
      --mono:  'JetBrains Mono', monospace;
      --ease:  cubic-bezier(0.23, 1, 0.32, 1);
      --text-1: #fdf0f5;
      --text-2: rgba(253,230,240,0.55);
      --text-3: rgba(253,230,240,0.30);
      --rose:   #e91e63;
      --blush:  #f48fb1;
      --gold:   #ffb74d;
      --glass:      rgba(40,8,32,0.68);
      --glass-h:    rgba(60,14,48,0.80);
      --border:     rgba(233,30,99,0.20);
      --border-h:   rgba(244,143,177,0.40);
      --border-dim: rgba(233,30,99,0.10);
    }

    html, body {
      min-height: 100%;
      font-family: var(--font);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
    }

    body {
      background:
        radial-gradient(ellipse 90% 55% at 12% 0%,   rgba(180,20,75,0.52)  0%, transparent 55%),
        radial-gradient(ellipse 55% 45% at 88% 10%,  rgba(255,130,40,0.28) 0%, transparent 50%),
        radial-gradient(ellipse 70% 60% at 50% 110%, rgba(70,5,55,0.85)    0%, transparent 60%),
        linear-gradient(170deg, #280d2e 0%, #180820 40%, #0e0515 100%);
      min-height: 100vh;
    }

    .bloom {
      position: fixed;
      width: 700px; height: 380px;
      top: -100px; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse at center, rgba(220,40,100,0.14) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    .container {
      position: relative;
      max-width: 820px;
      margin: 0 auto;
      padding: 52px 40px;
      z-index: 1;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
    }

    .header-left { display: flex; flex-direction: column; gap: 6px; }

    .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    h1 {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(130deg, #fdf0f5 20%, #f48fb1 65%, #ffb74d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-3);
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(16px);
      transition: all 280ms var(--ease);
    }
    .back-btn:hover {
      color: var(--text-1);
      border-color: var(--border-h);
      background: var(--glass-h);
    }
    .back-btn svg { width: 14px; height: 14px; }

    /* CARDS */
    .cards { display: flex; flex-direction: column; gap: 14px; }

    .card {
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255,180,160,0.06), 0 8px 32px rgba(0,0,0,0.45);
      border-radius: 16px;
      padding: 26px 28px;
      animation: rise 0.5s var(--ease) both;
      transition: border-color 350ms var(--ease), background 350ms var(--ease);
    }
    .card:nth-child(1){animation-delay:.04s}
    .card:nth-child(2){animation-delay:.09s}
    .card:nth-child(3){animation-delay:.14s}
    .card:nth-child(4){animation-delay:.19s}
    .card:nth-child(5){animation-delay:.24s}
    .card:hover {
      border-color: var(--border-h);
      background: var(--glass-h);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* CARD META */
    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border-dim);
    }

    .id-badge {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--blush);
      background: rgba(244,143,177,0.10);
      border: 1px solid rgba(244,143,177,0.22);
      border-radius: 8px;
      padding: 5px 12px;
      letter-spacing: 0.04em;
    }

    .time {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-3);
    }

    /* FIELDS */
    .fields { display: flex; flex-direction: column; gap: 12px; }

    .field-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 16px;
      align-items: baseline;
    }

    .field-key {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .field-value {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-1);
      word-break: break-word;
      line-height: 1.5;
    }

    /* EMPTY */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 96px 40px;
      border-radius: 16px;
      border: 1px dashed rgba(233,30,99,0.16);
      text-align: center;
    }
    .empty svg {
      width: 44px; height: 44px;
      color: rgba(244,143,177,0.22);
      margin-bottom: 18px;
    }
    .empty p {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--text-3);
    }
  </style>
</head>
<body>
  <div class="bloom" aria-hidden="true"></div>

  <div class="container">
    <div class="header">
      <div class="header-left">
        <span class="eyebrow">Submissions</span>
        <h1>Inbox</h1>
      </div>
      <a href="/admin" class="back-btn">
        <i data-lucide="arrow-left"></i>
        Back
      </a>
    </div>

    <div class="cards">
      {{if .}}
        {{range .}}
        <div class="card">
          <div class="meta">
            <span class="id-badge">#{{.ID}}</span>
            <span class="time">{{.CreatedTime}}</span>
          </div>
          <div class="fields">
            {{range $key, $value := .Fields}}
            <div class="field-row">
              <span class="field-key">{{$key}}</span>
              <span class="field-value">{{$value}}</span>
            </div>
            {{end}}
          </div>
        </div>
        {{end}}
      {{else}}
      <div class="empty">
        <i data-lucide="inbox"></i>
        <p>No submissions yet. Waiting for incoming data.</p>
      </div>
      {{end}}
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
