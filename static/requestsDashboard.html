<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formus — Inbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #161616;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --text: #ffffff;
      --muted: #9ca3af;
      --muted2: #4b5563;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
    }

    .back-btn {
      color: var(--muted);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      transition: color 0.15s;
    }

    .back-btn:hover { color: var(--text); }

    .request-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    .meta-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .badge {
      background: var(--accent);
      color: #000;
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-weight: 600;
      font-size: 0.8rem;
    }

    .time {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
    }

    .fields-grid {
      display: grid;
      gap: 1rem;
    }

    .field-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 1rem;
    }

    .field-key {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-value {
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 500;
      word-break: break-word;
    }

    .empty-state {
      text-align: center;
      padding: 5rem 0;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      border: 1px dashed var(--border);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Inbox 📥</h1>
      <a href="/admin" class="back-btn">&larr; Back to Dashboard</a>
    </div>

    {{if .}}
      {{range .}}
      <div class="request-card">
        <div class="meta-info">
          <span class="badge">ID: #{{.ID}}</span>
          <span class="time">{{.CreatedTime}}</span>
        </div>
        
        <div class="fields-grid">
          {{range $key, $value := .Fields}}
          <div class="field-row">
            <span class="field-key">{{$key}}</span>
            <span class="field-value">{{$value}}</span>
          </div>
          {{end}}
        </div>
      </div>
      {{end}}
    {{else}}
      <div class="empty-state">
        No submissions found. Waiting for incoming data...
      </div>
    {{end}}
  </div>
</body>
</html>
