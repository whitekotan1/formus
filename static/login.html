<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formus — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(ellipse 90% 55% at 12% 0%,   rgba(180,20,75,0.52)  0%, transparent 55%),
        radial-gradient(ellipse 55% 45% at 88% 10%,  rgba(255,130,40,0.28) 0%, transparent 50%),
        radial-gradient(ellipse 70% 60% at 50% 110%, rgba(70,5,55,0.85)    0%, transparent 60%),
        linear-gradient(170deg, #280d2e 0%, #180820 40%, #0e0515 100%);
    }

    .bloom {
      position: fixed;
      width: 700px; height: 380px;
      top: -100px; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse at center, rgba(220,40,100,0.16) 0%, transparent 65%);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 400px;
      background: rgba(40,8,32,0.70);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(233,30,99,0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,180,160,0.07),
        0 32px 80px rgba(0,0,0,0.55);
      border-radius: 20px;
      padding: 44px 40px;
      animation: fadeUp 0.55s cubic-bezier(0.23,1,0.32,1) both;
      z-index: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.28em;
      color: #ffb74d;
      text-shadow: 0 0 20px rgba(255,183,77,0.5);
      margin-bottom: 36px;
    }

    h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.035em;
      margin-bottom: 8px;
      background: linear-gradient(130deg, #fdf0f5 20%, #f48fb1 70%, #ffb74d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: rgba(253,230,240,0.38);
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(253,230,240,0.32);
      margin-bottom: 10px;
    }

    input[type="password"] {
      width: 100%;
      background: rgba(80,8,52,0.38);
      border: 1px solid rgba(233,30,99,0.22);
      border-radius: 12px;
      color: #fdf0f5;
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      padding: 14px 18px;
      outline: none;
      margin-bottom: 14px;
      transition: all 250ms cubic-bezier(0.23,1,0.32,1);
      letter-spacing: 0.1em;
    }
    input[type="password"]::placeholder { color: rgba(253,230,240,0.18); }
    input[type="password"]:focus {
      background: rgba(100,12,68,0.48);
      border-color: rgba(244,143,177,0.50);
      box-shadow: 0 0 0 3px rgba(244,143,177,0.10);
    }

    .error {
      display: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #f48fb1;
      background: rgba(194,24,91,0.12);
      border: 1px solid rgba(194,24,91,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
    }
    .error.show { display: block; }

    button {
      width: 100%;
      background: linear-gradient(135deg, #c2185b 0%, #e91e63 50%, #f06292 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 17px;
      padding: 15px;
      cursor: pointer;
      box-shadow: 0 0 28px rgba(194,24,91,0.42), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: all 300ms cubic-bezier(0.23,1,0.32,1);
      margin-top: 4px;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 42px rgba(240,98,146,0.52), inset 0 1px 0 rgba(255,255,255,0.25);
    }
    button:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="bloom" aria-hidden="true"></div>

  <div class="card">
    <div class="logo">FORMUS</div>
    <h1>Welcome back.</h1>
    <p class="sub">Enter your password to continue</p>

    <form action="/login" method="POST">
      <label>Password</label>
      <div class="error" id="err">Wrong password. Try again.</div>
      <input type="password" name="password" placeholder="••••••••" autofocus/>
      <button type="submit">Enter →</button>
    </form>
  </div>

  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('err').classList.add('show');
    }
  </script>
</body>
</html>
