<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FormFlow — Self-hosted forms</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232,255,71,0.07) 0%, transparent 70%);
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .container {
      position: relative;
      max-width: 560px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    h1 {
      font-size: clamp(2.8rem, 8vw, 4.5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1.2rem;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    h1 span {
      color: var(--accent);
    }

    .sub {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto 2.5rem;
      font-family: 'DM Mono', monospace;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .cta {
      display: inline-block;
      background: var(--accent);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      padding: 0.9rem 2.2rem;
      border-radius: 4px;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(232,255,71,0.25);
    }

    .features {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 3.5rem;
      flex-wrap: wrap;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .feature {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .feature::before {
      content: '✦';
      color: var(--accent);
      font-size: 0.6rem;
    }

    .footer {
      margin-top: 3rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: #333;
      animation: fadeUp 0.6s 0.6s ease both;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="badge">SELF-HOSTED · OPEN SOURCE</div>
    <h1>Forms.<br/>Your <span>server.</span><br/>Your data.</h1>
    <p class="sub">Drop a &lt;form&gt; tag anywhere. Submissions land in your dashboard. No SaaS. No monthly fees. Just you.</p>
    <a href="/login" class="cta">Open Dashboard →</a>
    <div class="features">
      <div class="feature">Single binary</div>
      <div class="feature">Zero dependencies</div>
      <div class="feature">SQLite storage</div>
      <div class="feature">CSV export</div>
    </div>
    <p class="footer">FormFlow — deploy once, own forever</p>
  </div>
</body>
</html>
