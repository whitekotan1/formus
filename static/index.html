<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formus — Self-hosted forms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { text-decoration: none; color: inherit; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;

      /* Spring dawn sky */
      background:
        radial-gradient(ellipse 90% 55% at 12% 0%,   rgba(180,20,75,0.52)  0%, transparent 55%),
        radial-gradient(ellipse 55% 45% at 88% 10%,  rgba(255,130,40,0.28) 0%, transparent 50%),
        radial-gradient(ellipse 70% 60% at 50% 110%, rgba(70,5,55,0.85)    0%, transparent 60%),
        linear-gradient(170deg, #280d2e 0%, #180820 40%, #0e0515 100%);
    }

    /* Soft ambient top bloom */
    .bloom {
      position: fixed;
      width: 800px; height: 400px;
      top: -120px; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse at center, rgba(220,40,100,0.18) 0%, transparent 65%);
      pointer-events: none;
    }

    .container {
      position: relative;
      max-width: 600px;
      width: 100%;
      text-align: center;
      z-index: 1;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(40,8,32,0.70);
      border: 1px solid rgba(233,30,99,0.28);
      backdrop-filter: blur(16px);
      color: rgba(244,143,177,0.85);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      padding: 7px 16px;
      border-radius: 999px;
      margin-bottom: 36px;
      animation: fadeUp 0.6s 0.1s cubic-bezier(0.23,1,0.32,1) both;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f48fb1;
      box-shadow: 0 0 8px rgba(244,143,177,0.8);
      animation: glow 2.5s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100%{box-shadow:0 0 6px rgba(244,143,177,0.5)}
      50%{box-shadow:0 0 16px rgba(255,138,101,0.9)}
    }

    /* Headline */
    h1 {
      font-size: clamp(3.2rem, 9vw, 5.2rem);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.04em;
      margin-bottom: 28px;
      animation: fadeUp 0.65s 0.2s cubic-bezier(0.23,1,0.32,1) both;

      background: linear-gradient(140deg, #fdf0f5 0%, #f48fb1 40%, #ffb74d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Sub */
    .sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      line-height: 1.75;
      color: rgba(253,230,240,0.45);
      max-width: 420px;
      margin: 0 auto 40px;
      animation: fadeUp 0.65s 0.3s cubic-bezier(0.23,1,0.32,1) both;
    }

    /* CTA */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #c2185b 0%, #e91e63 50%, #f06292 100%);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.01em;
      padding: 16px 34px;
      border-radius: 14px;
      box-shadow: 0 0 32px rgba(194,24,91,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: transform 350ms cubic-bezier(0.23,1,0.32,1), box-shadow 350ms cubic-bezier(0.23,1,0.32,1);
      animation: fadeUp 0.65s 0.4s cubic-bezier(0.23,1,0.32,1) both;
    }
    .cta:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 48px rgba(240,98,146,0.55), inset 0 1px 0 rgba(255,255,255,0.25);
    }
    .cta:active { transform: translateY(0); }
    .cta-arrow { font-size: 20px; line-height: 1; }

    /* Features */
    .features {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 52px;
      animation: fadeUp 0.65s 0.5s cubic-bezier(0.23,1,0.32,1) both;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(40,8,32,0.65);
      border: 1px solid rgba(233,30,99,0.18);
      backdrop-filter: blur(16px);
      border-radius: 10px;
      padding: 9px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: rgba(253,230,240,0.42);
      transition: border-color 300ms, color 300ms;
    }
    .feature:hover {
      border-color: rgba(244,143,177,0.35);
      color: rgba(253,230,240,0.70);
    }
    .feature-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(244,143,177,0.5);
      flex-shrink: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bloom" aria-hidden="true"></div>

  <div class="container">
    <div class="badge">
      <div class="badge-dot"></div>
      SELF-HOSTED · OPEN SOURCE
    </div>

    <h1>Forms.<br/>Your server.<br/>Your data.</h1>

    <p class="sub">Drop a &lt;form&gt; tag anywhere. Submissions land in your dashboard. No SaaS. No monthly fees. Just you.</p>

    <a href="/login" class="cta">
      Open Dashboard <span class="cta-arrow">→</span>
    </a>

    <div class="features">
      <div class="feature"><div class="feature-dot"></div>Single binary</div>
      <div class="feature"><div class="feature-dot"></div>Zero dependencies</div>
      <div class="feature"><div class="feature-dot"></div>SQLite storage</div>
      <div class="feature"><div class="feature-dot"></div>CSV export</div>
    </div>
  </div>
</body>
</html>
