<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formus — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #161616;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --text: #ffffff;
      --muted: #9ca3af;
      --muted2: #4b5563;
    }

    html {
      font-size: 16px; 
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 250px;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 2rem;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.15em;
      margin-bottom: 3rem;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.95rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.8rem 1rem;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.05em;
    }

    .nav a:hover, .nav a.active {
      background: var(--surface2);
      color: var(--text);
    }

    .nav a.active {
      color: var(--accent);
    }

    .sidebar-footer {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted2);
    }

    /* MAIN */
    .main {
      margin-left: 250px;
      padding: 3rem 4rem;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4rem;
    }

    .topbar h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      padding: 0.8rem 1.5rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .btn-ghost:hover {
      background: var(--surface2);
      border-color: var(--muted);
    }

    /* FORMS LIST */
    .section-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-bottom: 1.2rem;
    }

    .forms-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 2rem;
    }

    .form-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.15s, transform 0.15s;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
    }

    .form-item:hover {
      border-color: var(--muted);
      transform: translateY(-1px);
    }

    .form-item-left {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .form-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(232, 255, 71, 0.2);
    }

    .form-name {
      font-weight: 800;
      font-size: 1.2rem;
      margin-bottom: 0.3rem;
    }

    .form-endpoint {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent);
      opacity: 0.8;
    }

    .form-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 500;
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      border: 1px dashed var(--border);
      border-radius: 8px;
    }

    /* MODAL */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-bg.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
      animation: fadeUp 0.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal h2 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .modal p {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.5rem;
    }

    .field label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 0.6rem;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      padding: 0.8rem 1rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus { 
      border-color: var(--accent); 
      box-shadow: 0 0 0 1px var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo">FORMUS</div>
    <nav class="nav">
      <a href="/admin" class="active">⬡ &nbsp;Forms</a>
      <a href="#">⚙ &nbsp;Settings</a>
    </nav>
    <div class="sidebar-footer">v0.1.0 · self-hosted</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>Your Forms</h1>
      <button class="btn" onclick="openModal()">+ New Form</button>
    </div>

    <div class="section-title">ACTIVE ENDPOINTS</div>
    <div class="forms-list">
      
      {{range .}}
      <a href="/admin/requests?form_id={{.ID}}" class="form-item">
        <div class="form-item-left">
          <div class="form-dot"></div>
          <div>
            <div class="form-name">{{.Name}}</div>
            <div class="form-endpoint">POST /form?form_id={{.ID}}</div>
          </div>
        </div>
        <div class="form-count">View Submissions &rarr;</div>
      </a>
      {{else}}
      <div class="empty-state">
        No forms created yet. Click "+ New Form" to get started.
      </div>
      {{end}}

    </div>
  </main>

  <div class="modal-bg" id="modal">
    <div class="modal">
      <h2>New Form</h2>
      <p>Give your form a name to generate an endpoint</p>
      
      <form action="/form/create" method="POST">
        <div class="field">
          <label>FORM NAME</label>
          <input type="text" name="name" placeholder="e.g. Early Access Waitlist" required autofocus/>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn">Create &rarr;</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function openModal() { document.getElementById('modal').classList.add('open') }
    function closeModal() { document.getElementById('modal').classList.remove('open') }
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal()
    })
  </script>
</body>
</html>
